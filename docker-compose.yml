version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: agriinsight-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-agriinsight2024}
      MONGO_INITDB_DATABASE: agriinsight
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - agriinsight-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agriinsight-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-agriinsight2024}@mongodb:27017/agriinsight?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_super_secret_key}
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@agriinsight.pro}
      FROM_NAME: AgriInsight Pro
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - agriinsight-net
    healthcheck:
      test: wget -qO- http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agriinsight-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agriinsight-net

volumes:
  mongo_data:

networks:
  agriinsight-net:
    driver: bridge
